<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nizaam · day portfolio</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Poppins', sans-serif; }
        /* INTRO OVERLAY with truck loader (fixed wheels) */
        #intro-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e0f0ff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1a2a3a;
            text-align: center;
            z-index: 20;
            transition: opacity 1.8s ease;
            pointer-events: none;
            backdrop-filter: blur(5px);
            overflow: hidden;
        }
        #intro-title {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 700;
            letter-spacing: 8px;
            color: #1a3a5a;
            text-shadow: 0 10px 20px rgba(0,40,80,0.2);
            margin-bottom: 20px;
            animation: floatLight 3s infinite alternate;
            z-index: 2;
        }
        #intro-sub {
            font-size: 1.8rem;
            font-weight: 300;
            color: #2a4a6a;
            border-bottom: 2px solid #3a6a9a;
            padding-bottom: 15px;
            z-index: 2;
        }
        @keyframes floatLight {
            0% { transform: translateY(0); }
            100% { transform: translateY(-12px); }
        }
        #intro-footer {
            position: absolute;
            bottom: 50px;
            font-size: 1.2rem;
            color: #2a5a8a;
            background: rgba(255,255,255,0.7);
            padding: 8px 28px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid #3a8ac0;
            box-shadow: 0 5px 20px rgba(0,60,120,0.2);
            z-index: 2;
        }

        /* ----- TRUCK LOADER (fixed wheel alignment) ----- */
        .loader {
            width: fit-content;
            height: fit-content;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            transform: scale(1.2);
            z-index: 2;
        }

        .truckWrapper {
            width: 200px;
            height: 100px;
            display: flex;
            flex-direction: column;
            position: relative;
            align-items: center;
            justify-content: flex-end;
            overflow-x: hidden;
        }
        /* truck upper body */
        .truckBody {
            width: 130px;
            height: fit-content;
            margin-bottom: 6px;
            animation: motion 1s linear infinite;
        }
        /* truck suspension animation*/
        @keyframes motion {
            0% { transform: translateY(0px); }
            50% { transform: translateY(3px); }
            100% { transform: translateY(0px); }
        }
        /* truck's tires - fixed spacing */
        .truckTires {
            width: 130px;
            height: fit-content;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5px 0 10px; /* adjusted for even spacing */
            position: absolute;
            bottom: 0;
            box-sizing: border-box;
        }
        .truckTires svg {
            width: 24px;
        }

        .road {
            width: 100%;
            height: 1.5px;
            background-color: #282828;
            position: relative;
            bottom: 0;
            align-self: flex-end;
            border-radius: 3px;
        }
        .road::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 100%;
            background-color: #282828;
            right: -50%;
            border-radius: 3px;
            animation: roadAnimation 1.4s linear infinite;
            border-left: 10px solid white;
        }
        .road::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 100%;
            background-color: #282828;
            right: -65%;
            border-radius: 3px;
            animation: roadAnimation 1.4s linear infinite;
            border-left: 4px solid white;
        }

        .lampPost {
            position: absolute;
            bottom: 0;
            right: -90%;
            height: 90px;
            animation: roadAnimation 1.4s linear infinite;
        }

        @keyframes roadAnimation {
            0% { transform: translateX(0px); }
            100% { transform: translateX(-350px); }
        }
        /* ---------------------------------------- */

        /* music button */
        #music-toggle {
            position: absolute;
            bottom: 120px;
            right: 30px;
            background: rgba(255,255,255,0.8);
            color: #1a3a5a;
            border: 1px solid #3a8ac0;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 30;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s;
            pointer-events: auto;
        }
        #music-toggle:hover {
            background: #ffffff;
            transform: scale(1.05);
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.8);
            color: #1a3a5a;
            padding: 12px 28px;
            border-radius: 40px;
            pointer-events: none;
            backdrop-filter: blur(5px);
            border: 1px solid #3a8ac0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
            font-weight: 500;
        }
        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.8);
            color: #1a3a5a;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 1rem;
            border: 1px solid #3a8ac0;
            backdrop-filter: blur(4px);
            z-index: 10;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .label-css {
            color: #1a2a3a;
            font-weight: 600;
            font-size: 20px;
            background: rgba(255,255,255,0.9);
            padding: 8px 22px;
            border-radius: 30px;
            border-left: 6px solid #3a8ac0;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid #aaccff;
            box-shadow: 0 4px 15px rgba(0,60,120,0.2);
        }
        .label-css small {
            font-size: 14px;
            font-weight: 300;
            color: #2a4a6a;
            display: block;
            margin-top: 4px;
        }
        #break-score {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.8);
            color: #1a3a5a;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 18px;
            border: 1px solid #3a8ac0;
            backdrop-filter: blur(4px);
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

    <!-- music toggle button (indie) -->
    <button id="music-toggle">🎵 indie</button>

    <!-- hidden audio element for eurobeat instrumental (low volume) -->

    <!-- Import maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { loadCustomModels } from './loadModels.js';
        import { loadEngineSounds } from './audioLoader.js';

        // --- HIDE INTRO ---
        const introOverlay = document.getElementById('intro-overlay');
        setTimeout(() => {
            if (introOverlay.style.opacity !== '0') {
                introOverlay.style.opacity = '0';
                setTimeout(() => introOverlay.style.display = 'none', 1800);
            }
        }, 4000);
        window.addEventListener('keydown', () => {
            if (introOverlay.style.opacity !== '0') {
                introOverlay.style.opacity = '0';
                setTimeout(() => introOverlay.style.display = 'none', 1800);
            }
        }, { once: true });

        // --- MUSIC (eurobeat) ---
        const music = document.getElementById('bg-music');
        music.volume = 0.6;
        const musicBtn = document.getElementById('music-toggle');
        let musicPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (musicPlaying) {
                music.pause();
                musicBtn.textContent = '🎵 indie';
            } else {
                music.play().catch(e => {
                    console.log('Playback failed:', e);
                    musicBtn.textContent = '🎵 error';
                });
                musicBtn.textContent = '🎵 indie (on)';
            }
            musicPlaying = !musicPlaying;
        });

        // Track if user has interacted
        let userInteracted = false;

        window.addEventListener('keydown', () => {
            if (!musicPlaying && introOverlay.style.opacity === '0') {
                music.play().catch(e => {});
                userInteracted = true;
                musicPlaying = true;
                musicBtn.textContent = '🎵 indie (on)';
            }
        }, { once: true });

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff);
        scene.fog = new THREE.Fog(0xaaccff, 30, 200);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 8, 15);

        // --- AUDIO LISTENER (for engine sounds) ---
        const listener = new THREE.AudioListener();
        camera.add(listener);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const css2DRenderer = new CSS2DRenderer();
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.domElement.style.position = 'absolute';
        css2DRenderer.domElement.style.top = '0px';
        css2DRenderer.domElement.style.left = '0px';
        css2DRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(css2DRenderer.domElement);

        // --- CONTROLS (OrbitControls) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 4;
        controls.maxDistance = 8;
        controls.target.set(0, 1, 0);

        // --- LIGHTING ---
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
        sunLight.position.set(20, 30, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 50;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 60;
        scene.add(sunLight);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        
        const fillLight = new THREE.PointLight(0xffaa88, 0.8);
        fillLight.position.set(-10, 15, 20);
        scene.add(fillLight);

        // --- GROUND ---
        const groundGeometry = new THREE.CircleGeometry(300, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3d6e3d, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- LABEL HELPER ---
        function createPortfolioLabel(title, description, color = '#2a6f97') {
            const div = document.createElement('div');
            div.className = 'label-css';
            div.style.borderLeftColor = color;
            div.innerHTML = `<strong>${title}</strong><small>${description}</small>`;
            return new CSS2DObject(div);
        }

        // --- MAIN ROAD (curved) ---
        const points = [
            new THREE.Vector3(0, 0.02, 0),
            new THREE.Vector3(12, 0.02, 8),
            new THREE.Vector3(25, 0.02, 5),
            new THREE.Vector3(35, 0.02, -5),
            new THREE.Vector3(30, 0.02, -20),
            new THREE.Vector3(15, 0.02, -30),
            new THREE.Vector3(-5, 0.02, -25),
            new THREE.Vector3(-20, 0.02, -10),
            new THREE.Vector3(-15, 0.02, 10),
            new THREE.Vector3(5, 0.02, 20),
            new THREE.Vector3(20, 0.02, 25),
            new THREE.Vector3(30, 0.02, 35),
        ];

        const curve = new THREE.CatmullRomCurve3(points);
        
        const roadWidth = 4.2;
        const roadSegmentLength = 1.8;
        const totalCurveLength = curve.getLength();
        const numSegments = Math.floor(totalCurveLength / roadSegmentLength);
        
        const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 });
        const stripeMaterial = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
        const shoulderMaterial = new THREE.MeshStandardMaterial({ color: 0x7f8c8d });

        const roadPositions = [];

        for (let i = 0; i < numSegments; i++) {
            const t1 = i / numSegments;
            const t2 = (i + 1) / numSegments;
            
            const p1 = curve.getPoint(t1);
            const p2 = curve.getPoint(t2);
            
            const direction = new THREE.Vector3().subVectors(p2, p1);
            const length = direction.length();
            if (length < 0.01) continue;
            
            const center = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            roadPositions.push({ pos: center.clone(), dir: direction.clone().normalize() });
            
            const tile = new THREE.Mesh(new THREE.BoxGeometry(roadWidth, 0.15, length), roadMaterial);
            tile.position.copy(center); tile.position.y = 0.08;
            tile.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), direction.clone().normalize());
            tile.receiveShadow = true; tile.castShadow = false;
            scene.add(tile);
            
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.16, length*0.8), stripeMaterial);
            stripe.position.copy(center); stripe.position.y = 0.17;
            stripe.quaternion.copy(tile.quaternion); stripe.receiveShadow = true;
            scene.add(stripe);
            
            const perp = new THREE.Vector3(-direction.z, 0, direction.x).normalize();
            const leftShoulder = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, length*0.9), shoulderMaterial);
            leftShoulder.position.copy(center); leftShoulder.position.y = 0.12;
            leftShoulder.quaternion.copy(tile.quaternion);
            leftShoulder.position.addScaledVector(perp, roadWidth/2 - 0.3);
            scene.add(leftShoulder);
            
            const rightShoulder = leftShoulder.clone();
            rightShoulder.position.addScaledVector(perp, -roadWidth + 0.6);
            scene.add(rightShoulder);
        }

        // ========== SIDE ROADS ==========
        // Helper to add a straight side road
        function addSideRoad(startPos, direction, length, width = 3.5) {
            const endPos = startPos.clone().add(direction.clone().multiplyScalar(length));
            const dirVec = direction.clone().normalize();
            const perp = new THREE.Vector3(-dirVec.z, 0, dirVec.x).normalize();
            const center = startPos.clone().add(endPos).multiplyScalar(0.5);
            
            // Road tile (asphalt)
            const tileGeo = new THREE.BoxGeometry(width, 0.15, length);
            const tile = new THREE.Mesh(tileGeo, roadMaterial);
            tile.position.copy(center);
            tile.position.y = 0.08;
            tile.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dirVec);
            tile.receiveShadow = true;
            tile.castShadow = false;
            scene.add(tile);
            
            // Dashed center stripe (exactly like the main road)
            const dashLength = 0.8;
            const gapLength = 1.0;
            const dashCount = Math.floor(length / (dashLength + gapLength));
            for (let j = 0; j < dashCount; j++) {
                const tStart = j * (dashLength + gapLength) / length;
                const tEnd = (j * (dashLength + gapLength) + dashLength) / length;
                if (tEnd > 1) break;
                const dashStart = startPos.clone().lerp(endPos, tStart);
                const dashEnd = startPos.clone().lerp(endPos, tEnd);
                const dashDir = new THREE.Vector3().subVectors(dashEnd, dashStart);
                const dashLen = dashDir.length();
                if (dashLen < 0.1) continue;
                const dashCenter = new THREE.Vector3().addVectors(dashStart, dashEnd).multiplyScalar(0.5);
                const dashGeo = new THREE.BoxGeometry(0.2, 0.16, dashLen);
                const dash = new THREE.Mesh(dashGeo, stripeMaterial);
                dash.position.copy(dashCenter);
                dash.position.y = 0.17;
                dash.quaternion.copy(tile.quaternion);
                scene.add(dash);
            }
            
            // Shoulders (gray, same as main road)
            const leftShoulderGeo = new THREE.BoxGeometry(0.3, 0.1, length * 0.9);
            const leftShoulder = new THREE.Mesh(leftShoulderGeo, shoulderMaterial);
            leftShoulder.position.copy(center);
            leftShoulder.position.y = 0.12;
            leftShoulder.quaternion.copy(tile.quaternion);
            leftShoulder.position.addScaledVector(perp, width/2 - 0.3);
            scene.add(leftShoulder);
            
            const rightShoulder = leftShoulder.clone();
            rightShoulder.position.addScaledVector(perp, -width + 0.6);
            scene.add(rightShoulder);
        }

        // Helper to add a curved side road (uses a CatmullRomCurve3)
        function addCurvedRoad(startPos, initialDir, controlOffsets, width = 3.5) {
            // Build points relative to start position (in world coordinates)
            const points = [startPos];
            let currentPos = startPos.clone();
            for (let i = 0; i < controlOffsets.length; i++) {
                const offset = controlOffsets[i];
                const nextPos = currentPos.clone().add(new THREE.Vector3(offset[0], 0, offset[1]));
                points.push(nextPos);
                currentPos = nextPos;
            }
            const curve = new THREE.CatmullRomCurve3(points);
            const totalLength = curve.getLength();
            const segmentLength = 0.8; // small segment for smooth curve
            const numSegments = Math.floor(totalLength / segmentLength);
            
            for (let i = 0; i < numSegments; i++) {
                const t1 = i / numSegments;
                const t2 = (i + 1) / numSegments;
                const p1 = curve.getPoint(t1);
                const p2 = curve.getPoint(t2);
                const dir = new THREE.Vector3().subVectors(p2, p1);
                const len = dir.length();
                if (len < 0.1) continue;
                const center = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
                const tileGeo = new THREE.BoxGeometry(width, 0.15, len);
                const tile = new THREE.Mesh(tileGeo, roadMaterial);
                tile.position.copy(center);
                tile.position.y = 0.08;
                tile.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir.clone().normalize());
                tile.receiveShadow = true;
                tile.castShadow = false;
                scene.add(tile);
                
                // Dashed center stripe
                const dashLength = 0.8;
                const gapLength = 1.0;
                const dashCount = Math.floor(len / (dashLength + gapLength));
                for (let j = 0; j < dashCount; j++) {
                    const tStart = j * (dashLength + gapLength) / len;
                    const tEnd = (j * (dashLength + gapLength) + dashLength) / len;
                    if (tEnd > 1) break;
                    const dashStart = p1.clone().lerp(p2, tStart);
                    const dashEnd = p1.clone().lerp(p2, tEnd);
                    const dashLen = dashEnd.clone().sub(dashStart).length();
                    const dashCenter = new THREE.Vector3().addVectors(dashStart, dashEnd).multiplyScalar(0.5);
                    const dashGeo = new THREE.BoxGeometry(0.2, 0.16, dashLen);
                    const dash = new THREE.Mesh(dashGeo, stripeMaterial);
                    dash.position.copy(dashCenter);
                    dash.position.y = 0.17;
                    dash.quaternion.copy(tile.quaternion);
                    scene.add(dash);
                }
                
                // Shoulders
                const perp = new THREE.Vector3(-dir.z, 0, dir.x).normalize();
                const leftShoulderGeo = new THREE.BoxGeometry(0.3, 0.1, len * 0.9);
                const leftShoulder = new THREE.Mesh(leftShoulderGeo, shoulderMaterial);
                leftShoulder.position.copy(center);
                leftShoulder.position.y = 0.12;
                leftShoulder.quaternion.copy(tile.quaternion);
                leftShoulder.position.addScaledVector(perp, width/2 - 0.3);
                scene.add(leftShoulder);
                
                const rightShoulder = leftShoulder.clone();
                rightShoulder.position.addScaledVector(perp, -width + 0.6);
                scene.add(rightShoulder);
            }
        }

        const mainRoadHalfWidth = roadWidth / 2;
        const gap = 0.2;

        // ----- CURVED SIDE ROAD at t = 0.38 -----
        const tCurve = 0.38;
        const sideValue = 0.9; // right side
        const posOnCurve = curve.getPoint(tCurve);
        const tangent = curve.getTangent(tCurve);
        const perp = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
        const startOffset = mainRoadHalfWidth + gap;
        const startPos = posOnCurve.clone().addScaledVector(perp, sideValue * startOffset);
        // Direction away from road: same as perp direction (right side)
        const initialDir = perp.clone().multiplyScalar(sideValue);
        // Define curve control points as [dx, dz] offsets in world coordinates
        // This creates a gentle S‑shaped curve: go forward 5, then turn left (negative z) and continue.
        const controlOffsets = [
            [5, 0],      // straight 5 units
            [8, -4],     // curve left
            [12, -6]     // continue curve
        ];
        addCurvedRoad(startPos, initialDir, controlOffsets, 3.5);

        // Optional: add more straight side roads here if desired
        // const sideRoads = [ ... ]; // uncomment and fill
        // sideRoads.forEach(road => { ... });
        // ==================================

        // --- BREAKABLE TREES ---
        const breakableTrees = [];
        let brokenTreeCount = 0;
        const scoreElement = document.getElementById('break-score');
        const debrisPieces = [];

        function spawnTreeDebris(pos) {
            for (let i = 0; i < 4; i++) {
                const log = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2, 0.2, 0.6 + Math.random()*0.4),
                    new THREE.MeshStandardMaterial({ color: 0x8B5A2B })
                );
                log.position.copy(pos.clone().add(new THREE.Vector3(
                    (Math.random()-0.5)*1.5, 0.5 + Math.random()*1.5, (Math.random()-0.5)*1.5
                )));
                log.userData.velocity = new THREE.Vector3(
                    (Math.random()-0.5)*6, Math.random()*5, (Math.random()-0.5)*6
                );
                log.userData.angularVelocity = new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(0.1);
                log.castShadow = true; log.receiveShadow = true;
                scene.add(log);
                debrisPieces.push(log);
            }
            for (let i = 0; i < 6; i++) {
                const leaf = new THREE.Mesh(
                    new THREE.BoxGeometry(0.3, 0.2, 0.3),
                    new THREE.MeshStandardMaterial({ color: 0x2E7D32 })
                );
                leaf.position.copy(pos.clone().add(new THREE.Vector3(
                    (Math.random()-0.5)*2, 1.5 + Math.random()*2, (Math.random()-0.5)*2
                )));
                leaf.userData.velocity = new THREE.Vector3(
                    (Math.random()-0.5)*7, Math.random()*6, (Math.random()-0.5)*7
                );
                leaf.userData.angularVelocity = new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(0.2);
                leaf.castShadow = true; leaf.receiveShadow = true;
                scene.add(leaf);
                debrisPieces.push(leaf);
            }
        }

        function createTree(pos) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
            
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.8), trunkMat);
            trunk.position.y = 0.9; trunk.castShadow = true; trunk.receiveShadow = true;
            group.add(trunk);
            
            const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 8), foliageMat);
            foliage1.position.y = 1.8; foliage1.castShadow = true; foliage1.receiveShadow = true;
            group.add(foliage1);
            
            const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 8), foliageMat);
            foliage2.position.y = 2.5; foliage2.castShadow = true; foliage2.receiveShadow = true;
            group.add(foliage2);
            
            group.position.copy(pos);
            return group;
        }

        // --- BREAKABLE SIGNS ---
        const breakableSigns = [];

        function createSign(pos, title, desc, color) {
            const group = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 2.5), new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
            pole.position.y = 1.25; pole.castShadow = true; pole.receiveShadow = true;
            group.add(pole);
            const board = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 0.2), new THREE.MeshStandardMaterial({ color: 0xecf0f1 }));
            board.position.y = 2.0; board.castShadow = true; board.receiveShadow = true;
            group.add(board);
            group.position.copy(pos);
            scene.add(group);
            
            const label = createPortfolioLabel(title, desc, color);
            label.position.copy(pos.clone().add(new THREE.Vector3(0, 2.8, 0)));
            scene.add(label);
            
            return { group, label };
        }

        const signInfos = [
            { t: 0.02, title: "🚀 WELCOME", desc: "Nizaam's portfolio", color: "#f1c40f" },
            { t: 0.95, title: "🏁 FINISH", desc: "Thanks for exploring!", color: "#f39c12" }
        ];

        signInfos.forEach((item) => {
            const pos = curve.getPoint(item.t);
            const tangent = curve.getTangent(item.t);
            const perp = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
            const side = Math.sin(item.t * Math.PI * 8) > 0 ? 1 : -1;
            const signPos = pos.clone().addScaledVector(perp, side * 3.5);
            signPos.y = 0;
            const sign = createSign(signPos, item.title, item.desc, item.color);
            breakableSigns.push(sign);
        });

        // --- HOUSES (removed) ---
        const houses = [];

        // --- BOUNCY BALL ---
        const ballGeometry = new THREE.SphereGeometry(0.7, 32, 32);
        const ballMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0x442200 });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.position.set(10, 1.0, 5);
        ball.castShadow = true; ball.receiveShadow = true;
        scene.add(ball);
        const ballLines = new THREE.LineSegments(new THREE.EdgesGeometry(ballGeometry), new THREE.LineBasicMaterial({ color: 0x000000 }));
        ball.add(ballLines);
        ball.userData.velocity = new THREE.Vector3(0, 0, 0);
        ball.userData.gravity = -9.8;
        ball.userData.bounce = 0.8;
        ball.userData.radius = 0.7;

        // --- Load custom models from external file ---
        loadCustomModels(scene, curve, houses, breakableTrees);

        // --- CAR LOADING ---
        let carGroup, wheelMeshes = [];
        let carSpeed = 0;
        let idleSound, accelSound, decelSound;
        let currentState = 'idle';

        const input = { throttle: false, brake: false, left: false, right: false };
        window.addEventListener('keydown', (e) => {
            if (['w','W','ArrowUp'].includes(e.key)) input.throttle = true;
            if (['s','S','ArrowDown'].includes(e.key)) input.brake = true;
            if (['a','A','ArrowLeft'].includes(e.key)) input.left = true;
            if (['d','D','ArrowRight'].includes(e.key)) input.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (['w','W','ArrowUp'].includes(e.key)) input.throttle = false;
            if (['s','S','ArrowDown'].includes(e.key)) input.brake = false;
            if (['a','A','ArrowLeft'].includes(e.key)) input.left = false;
            if (['d','D','ArrowRight'].includes(e.key)) input.right = false;
        });

        const loader = new GLTFLoader();
        loader.load('models/1985_toyota_sprinter_trueno_ae86.glb',
            (gltf) => {
                const carModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(carModel);
                const center = box.getCenter(new THREE.Vector3());
                carModel.position.sub(center);
                const size = box.getSize(new THREE.Vector3()).length();
                const scaleFactor = 4.5 / size;
                carModel.scale.setScalar(scaleFactor);

                carGroup = new THREE.Group();
                carGroup.add(carModel);
                const startPos = curve.getPoint(0.02);
                carGroup.position.copy(startPos);
                carGroup.position.y = 0.2;
                const startTangent = curve.getTangent(0.02);
                carGroup.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), startTangent);
                scene.add(carGroup);

                // --- LOAD ENGINE SOUNDS (from separate file) ---
                const sounds = loadEngineSounds(listener);
                idleSound = sounds.idleSound;
                accelSound = sounds.accelSound;
                decelSound = sounds.decelSound;
                const ready = sounds.ready;

                carGroup.add(idleSound);
                carGroup.add(accelSound);
                carGroup.add(decelSound);

                ready.then(() => {
                    console.log('All engine sounds loaded');
                    if (userInteracted) {
                        idleSound.play();
                    }
                });

                // --- WHEEL DETECTION ---
                carModel.traverse((child) => {
                    if (child.isMesh) {
                        const name = child.name;
                        if (name.includes('AE86Ani_Wheel') || name.includes('AE86Ani_Disc')) {
                            if (!name.includes('Door')) {
                                wheelMeshes.push(child);
                            }
                        }
                    }
                });

                if (wheelMeshes.length === 0) {
                    let count = 0;
                    carModel.traverse((child) => {
                        if (child.isMesh && count < 4) {
                            const name = child.name.toLowerCase();
                            if (!name.includes('body') && !name.includes('cabin') && !name.includes('door')) {
                                wheelMeshes.push(child);
                                count++;
                            }
                        }
                    });
                }
                if (wheelMeshes.length === 0) {
                    let count = 0;
                    carModel.traverse((child) => { if (child.isMesh && count < 4) { wheelMeshes.push(child); count++; } });
                }
                console.log('Car loaded, wheels:', wheelMeshes.map(w => w.name));
            },
            undefined,
            (err) => console.error('Error loading car:', err)
        );

        // --- PHYSICS & COLLISION ---
        function handleCollisions(delta) {
            if (!carGroup) return;
            const carPos = carGroup.position.clone();
            const carRadius = 1.5;
            const speedMagnitude = Math.abs(carSpeed);

            for (let i = breakableTrees.length - 1; i >= 0; i--) {
                const tree = breakableTrees[i];
                const dist = carPos.distanceTo(tree.position);
                if (dist < carRadius + 1.0) {
                    if (speedMagnitude > 3) {
                        spawnTreeDebris(tree.position.clone());
                        scene.remove(tree);
                        breakableTrees.splice(i, 1);
                        brokenTreeCount++;
                        scoreElement.innerText = `🌳 trees smashed: ${brokenTreeCount}`;
                    } else {
                        carSpeed *= 0.7;
                    }
                }
            }

            for (let i = breakableSigns.length - 1; i >= 0; i--) {
                const sign = breakableSigns[i];
                const dist = carPos.distanceTo(sign.group.position);
                if (dist < carRadius + 1.0 && speedMagnitude > 2) {
                    for (let j = 0; j < 4; j++) {
                        const piece = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2), new THREE.MeshStandardMaterial({ color: 0xecf0f1 }));
                        piece.position.copy(sign.group.position.clone().add(new THREE.Vector3(
                            (Math.random()-0.5)*1.5, Math.random()*2, (Math.random()-0.5)*1.5
                        )));
                        piece.userData.velocity = new THREE.Vector3((Math.random()-0.5)*8, Math.random()*6, (Math.random()-0.5)*8);
                        piece.castShadow = true;
                        scene.add(piece);
                        debrisPieces.push(piece);
                    }
                    scene.remove(sign.group);
                    scene.remove(sign.label);
                    breakableSigns.splice(i, 1);
                }
            }

            houses.forEach(house => {
                const dist = carPos.distanceTo(house.position);
                if (dist < carRadius + 1.5) {
                    const dir = carPos.clone().sub(house.position).normalize();
                    carGroup.position.copy(house.position.clone().add(dir.multiplyScalar(carRadius + 1.5)));
                    carSpeed = 0;
                }
            });

            const ballPos = ball.position;
            const ballVel = ball.userData.velocity;
            const ballRadius = ball.userData.radius;
            const distToCar = carPos.distanceTo(ballPos);
            if (distToCar < carRadius + ballRadius) {
                const dir = ballPos.clone().sub(carPos).normalize();
                ballVel.copy(dir.multiplyScalar(speedMagnitude * 1.8));
                ballVel.y += 6;
            }
            ballVel.y += ball.userData.gravity * delta;
            ball.position.add(ballVel.clone().multiplyScalar(delta));
            if (ball.position.y < ballRadius) {
                ball.position.y = ballRadius;
                ballVel.y = Math.abs(ballVel.y) * ball.userData.bounce;
                ballVel.x *= 0.95; ballVel.z *= 0.95;
            }
            if (Math.abs(ball.position.x) > 80) ballVel.x *= -0.5;
            if (Math.abs(ball.position.z) > 80) ballVel.z *= -0.5;

            for (let i = debrisPieces.length - 1; i >= 0; i--) {
                const piece = debrisPieces[i];
                piece.userData.velocity.y += ball.userData.gravity * delta * 0.5;
                piece.position.add(piece.userData.velocity.clone().multiplyScalar(delta));
                if (piece.userData.angularVelocity) {
                    piece.rotation.x += piece.userData.angularVelocity.x;
                    piece.rotation.y += piece.userData.angularVelocity.y;
                    piece.rotation.z += piece.userData.angularVelocity.z;
                }
                if (piece.position.y < -2 || Math.abs(piece.position.x) > 100 || Math.abs(piece.position.z) > 100) {
                    scene.remove(piece);
                    debrisPieces.splice(i, 1);
                }
            }
        }

        // --- UPDATE CAR (with engine sound state machine) ---
        function updateCar(delta) {
            if (!carGroup) return;
            const acceleration = 12;
            const maxSpeed = 18;
            const friction = 6;
            const turnSpeed = 2.2;
            if (input.throttle) carSpeed += acceleration * delta;
            if (input.brake) carSpeed -= acceleration * delta;
            carSpeed = Math.max(-maxSpeed/2, Math.min(maxSpeed, carSpeed));
            if (!input.throttle && !input.brake) {
                if (carSpeed > 0) carSpeed = Math.max(0, carSpeed - friction * delta);
                else carSpeed = Math.min(0, carSpeed + friction * delta);
            }
            if (input.left) carGroup.rotation.y += turnSpeed * delta * (carSpeed / maxSpeed);
            if (input.right) carGroup.rotation.y -= turnSpeed * delta * (carSpeed / maxSpeed);
            const forward = new THREE.Vector3(0,0,1).applyQuaternion(carGroup.quaternion);
            carGroup.position.add(forward.multiplyScalar(carSpeed * delta));
            carGroup.position.x = Math.max(-100, Math.min(120, carGroup.position.x));
            carGroup.position.z = Math.max(-100, Math.min(120, carGroup.position.z));
            carGroup.position.y = 0.25;
            wheelMeshes.forEach(w => { w.rotation.x -= carSpeed * delta * 2.5; });
            handleCollisions(delta);

            // --- ENGINE SOUND STATE MACHINE ---
            if (!idleSound || !accelSound || !decelSound) return;

            const speedAbs = Math.abs(carSpeed);
            const speedRatio = Math.min(speedAbs / maxSpeed, 1.0);

            let desiredState = 'idle';
            if (speedAbs > 0.5) {
                if (input.throttle) {
                    desiredState = 'accel';
                } else if (input.brake) {
                    desiredState = 'decel';
                } else {
                    desiredState = speedAbs > 2 ? 'decel' : 'idle';
                }
            } else {
                desiredState = 'idle';
            }

            if (desiredState !== currentState) {
                idleSound.stop();
                accelSound.stop();
                decelSound.stop();
                currentState = desiredState;
                if (currentState === 'idle' && idleSound.buffer) idleSound.play();
                else if (currentState === 'accel' && accelSound.buffer) accelSound.play();
                else if (currentState === 'decel' && decelSound.buffer) decelSound.play();
            }

            if (currentState === 'accel' && accelSound.isPlaying) {
                accelSound.setPlaybackRate(0.8 + speedRatio * 0.8);
            } else if (currentState === 'decel' && decelSound.isPlaying) {
                decelSound.setPlaybackRate(0.8 + speedRatio * 0.4);
            }
        }

        // --- ANIMATION LOOP (with petal animation inside) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            updateCar(delta);

            if (carGroup) {
                controls.target.copy(carGroup.position.clone().add(new THREE.Vector3(0, 1, 0)));
            }

            controls.update();

            // --- Animate falling petals for the sakura tree ---
            if (breakableTrees && breakableTrees.length > 0) {
                breakableTrees.forEach(tree => {
                    if (tree.userData.petals && tree.userData.petalVelocities) {
                        const petals = tree.userData.petals;
                        const velocities = tree.userData.petalVelocities;
                        const positions = petals.geometry.attributes.position.array;
                        for (let i = 0; i < velocities.length; i++) {
                            // Update position
                            let x = positions[i*3] + velocities[i].vx * delta;
                            let y = positions[i*3+1] + velocities[i].vy * delta;
                            let z = positions[i*3+2] + velocities[i].vz * delta;

                            // Reset if below ground (y < 0)
                            if (y < 0) {
                                const radius = 2 + Math.random() * 4;
                                const angle = Math.random() * Math.PI * 2;
                                x = Math.cos(angle) * radius;
                                z = Math.sin(angle) * radius;
                                y = 5 + Math.random() * 3;
                                // Reset horizontal drift
                                velocities[i].vx = (Math.random() - 0.5) * 0.2;
                                velocities[i].vz = (Math.random() - 0.5) * 0.2;
                            }

                            positions[i*3] = x;
                            positions[i*3+1] = y;
                            positions[i*3+2] = z;
                        }
                        petals.geometry.attributes.position.needsUpdate = true;
                    }
                });
            }

            renderer.render(scene, camera);
            css2DRenderer.render(scene, camera);
        }

        animate();

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
